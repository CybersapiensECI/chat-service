spring.application.name=chat-service
server.port=8082

# Credenciales reales SOLO por variable de entorno (nunca en el repo — las
# que había antes acá quedaron expuestas en el historial de git y deben
# rotarse en MongoDB Atlas / CloudAMQP). Para desarrollo local, exportar
# estas env vars con las credenciales de dev antes de levantar el servicio.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5671}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST}
spring.rabbitmq.ssl.enabled=${SPRING_RABBITMQ_SSL_ENABLED:true}

rabbitmq.exchange=notification.exchange
rabbitmq.routing-keys.chat=chat.message

# Consumidas por chat-service: amigos nuevos -> sala directa ACTIVE,
# parche nuevo / miembro nuevo -> sala grupal.
rabbitmq.queues.friendship=chat.friendship.queue
rabbitmq.queues.parche-created=chat.parche.created.queue
rabbitmq.queues.parche-member-joined=chat.parche.member-joined.queue
